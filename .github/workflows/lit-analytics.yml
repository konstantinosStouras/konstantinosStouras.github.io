name: lit — update analytics summary

# Pre-aggregates the whole Lit corpus (fun/lit/data/ + fun/lit/data-ft50/) into
# the small, committed JSON files the analytics dashboard reads:
#   fun/lit/analytics/data.json        (per-journal × per-year aggregates, top-cited)
#   fun/lit/analytics/authors.json     (per-author aggregates)
#   fun/lit/analytics/disruption.json  (per-paper disruption index D over the
#                                       in-catalog citation graph, fun/lit/data-refs/)
# so stouras.com/fun/lit/analytics/ can draw every chart client-side without
# ever downloading the ~270 MB of raw papers. Purely offline: reads only the
# static datasets already committed by the lit / lit-ft50 data + reference builds.
# See fun/lit/_scraper/build-analytics.mjs and build-disruption.mjs.

on:
  schedule:
    # 08:10 UTC — after both the native lit build (05:30) and the FT50 catalog
    # build (07:15) have refreshed and committed their data for the day.
    - cron: '10 8 * * *'
  workflow_dispatch: {}      # run on demand from the Actions tab
  push:
    # Re-run whenever the aggregator or the page itself changes, so a merge
    # seeds fresh figures immediately instead of waiting for the daily schedule.
    paths:
      - '.github/workflows/lit-analytics.yml'
      - 'fun/lit/_scraper/build-analytics.mjs'
      - 'fun/lit/_scraper/build-disruption.mjs'

# Never let two analytics builds race each other.
concurrency:
  group: lit-analytics-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write            # needed to commit the refreshed summary back
  pages: write               # needed to request a Pages rebuild if a deploy fails

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build analytics summary
        run: node fun/lit/_scraper/build-analytics.mjs

      - name: Build disruption analysis
        # Team-science measures (disruption index D) over the in-catalog citation
        # graph (fun/lit/data-refs/). Reads only committed files; grows with the
        # reference graph. Harmless if data-refs/ is empty (writes 0 papers).
        run: node fun/lit/_scraper/build-disruption.mjs

      - name: Commit refreshed analytics
        # Only master carries the committed summary. Feature branches (e.g. a PR
        # that edits the aggregator) still run the build above as a check but do
        # not commit generated JSON into their own diffs.
        if: github.ref == 'refs/heads/master'
        # This workflow only writes fun/lit/analytics/*.json — a disjoint set of
        # paths from the data builds (fun/lit/data, fun/lit/data-ft50) — so a
        # concurrent commit never conflicts; a plain rebase-then-push suffices.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fun/lit/analytics/data.json fun/lit/analytics/authors.json fun/lit/analytics/disruption.json
          if git diff --cached --quiet; then
            echo "No analytics changes — nothing to commit."
            exit 0
          fi
          git commit -m "lit: refresh analytics summary"
          for i in 1 2 3 4; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (concurrent data commit?) — rebasing onto the tip and retrying…"
            git fetch origin ${{ github.ref_name }}
            git rebase origin/${{ github.ref_name }} || { git rebase --abort; exit 1; }
            sleep 5
          done
          echo "::error::Could not push the refreshed analytics after 4 attempts."
          exit 1

      # A committed summary is not enough: the GitHub Pages deploy that follows
      # the push can lag or fail transiently, silently serving the OLD analytics
      # page (missing new files like disruption.json). Poll the live site; if the
      # fresh summary didn't land, request a rebuild and poll again — the same
      # self-heal every lit/ms data workflow already does.
      - name: Verify the live site serves the fresh analytics (self-heal a failed deploy)
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIVE_DISR: https://www.stouras.com/fun/lit/analytics/disruption.json
        run: |
          want=$(jq -r '.generated // ""' fun/lit/analytics/disruption.json)
          echo "Committed analytics generated: $want"
          if [ -z "$want" ]; then echo "No generation date to verify — skipping."; exit 0; fi
          poll() {  # poll <tries> — succeed once the live disruption.json is generated >= committed
            for i in $(seq 1 "$1"); do
              live=$(curl -sf --max-time 25 "$LIVE_DISR?nc=${GITHUB_RUN_ID}-${RANDOM}" | jq -r '.generated // "unreachable"' || echo "unreachable")
              echo "  try $i/$1: live generated = $live"
              if [ "$live" != "unreachable" ] && [ -n "$live" ] && [ ! "$live" \< "$want" ]; then return 0; fi
              sleep 60
            done
            return 1
          }
          if poll 8; then echo "Live analytics is current (disruption.json served)."; exit 0; fi
          echo "Live site still stale — requesting a GitHub Pages rebuild..."
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds" \
            || echo "WARNING: Pages rebuild request failed (check token permissions)."
          if poll 10; then echo "Live analytics recovered after the rebuild request."; exit 0; fi
          echo "::error::Live analytics still stale (wanted generated >= $want). Re-run this workflow or the pages-build-deployment workflow."
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "### lit analytics summary" >> "$GITHUB_STEP_SUMMARY"
          if [ -f fun/lit/analytics/data.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            node -e 'const d=require("./fun/lit/analytics/data.json");console.log(JSON.stringify({generated:d.generated,years:[d.yearMin,d.yearMax],totals:d.totals},null,2))' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f fun/lit/analytics/disruption.json ]; then
            echo '**Disruption analysis**' >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            node -e 'const d=require("./fun/lit/analytics/disruption.json");console.log(JSON.stringify(d.totals,null,2))' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
