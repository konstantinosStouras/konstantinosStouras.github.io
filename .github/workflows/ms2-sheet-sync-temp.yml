name: ms2 — TEMP fetch ms Google Sheet for comparison

# TEMPORARY, manual-only. Downloads the public "ManSci Metadata" Google Sheet
# tabs (the backend of stouras.com/fun/ms/) as CSV and commits them under
# fun/ms2/_scraper/_sheet-snapshot/ so the ms-vs-ms2 dataset comparison can run
# in an environment where Google is unreachable. Delete this file (and the
# snapshot folder) once the comparison is done.

on:
  workflow_dispatch: {}
  push:
    # Not on master (this file never merges): runs when this file itself is
    # pushed to the working branch, since branch-only workflows cannot be
    # dispatched by the API.
    paths:
      - '.github/workflows/ms2-sheet-sync-temp.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sheet tabs as CSV
        run: |
          SHEET=11MKt6uzfnxTNTbK4Kb1jwW32cEsKZcBRncubV2omJzQ
          DIR=fun/ms2/_scraper/_sheet-snapshot
          mkdir -p "$DIR"
          for tab in Data Authors Editors Areas Affiliations_Merged Affiliations Meta RecentlyAdded; do
            url="https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?tqx=out:csv&sheet=${tab}"
            if curl -sfL --max-time 300 "$url" -o "$DIR/${tab}.csv"; then
              # A missing tab returns an HTML error page, not CSV — drop those.
              if head -c 1 "$DIR/${tab}.csv" | grep -q '<'; then
                echo "tab ${tab}: got HTML (missing tab?) — skipping"; rm -f "$DIR/${tab}.csv"
              else
                echo "tab ${tab}: $(wc -l < "$DIR/${tab}.csv") lines, $(wc -c < "$DIR/${tab}.csv") bytes"
              fi
            else
              echo "tab ${tab}: fetch FAILED"
            fi
          done
          ls -la "$DIR"

      - name: Commit snapshot to this branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fun/ms2/_scraper/_sheet-snapshot
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "ms2: TEMP snapshot of the ms Google Sheet for dataset comparison"
            for i in 1 2 3; do
              git push origin HEAD:${{ github.ref_name }} && break
              git pull --rebase origin ${{ github.ref_name }}
            done
          fi
