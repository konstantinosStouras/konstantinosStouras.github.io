name: lit — update FT50 (merged catalog) data

# Builds fun/lit's OWN copy of the FT50 dataset (all 50 journals on the
# Financial Times FT50 research-rank list) by pulling from the Crossref API,
# then commits the refreshed files in fun/lit/data-ft50/ back to the branch.
# This is the pipeline behind the lit page's FT50 merge / "Journal types"
# filter — vendored from fun/ft50 so lit does not depend on that app's
# dataset. The journal list itself lives in fun/lit/_scraper-ft50/journals.json
# and is checked against ft.com once a year by lit-ft50-check-list.yml.
# See fun/lit/_HOW-IT-WORKS.md.

on:
  schedule:
    # Daily, 07:15 UTC (offset from the ms build at 05:00, the lit build at
    # 05:30, the preprints backfill at 06:45 and the ft50 build at 06:00 so no
    # two data builds race a Pages deploy — and so Crossref isn't hit by two
    # full FT50 walks at once). Nothing is committed on days with no changes.
    - cron: '15 7 * * *'
  workflow_dispatch: {}      # run on demand from the Actions tab
  push:
    # Run once whenever the pipeline itself changes, so a new branch seeds its
    # data immediately instead of waiting for the daily schedule.
    paths:
      - '.github/workflows/lit-ft50-update-data.yml'
      - 'fun/lit/_scraper-ft50/build-data.mjs'
      - 'fun/lit/_scraper-ft50/informs-editors.mjs'
      - 'fun/lit/_scraper-ft50/journals.json'

# Never let two data builds race; let a running one finish.
concurrency:
  group: lit-ft50-update-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write            # needed to commit the refreshed data back
  pages: write               # needed to request a Pages rebuild if a deploy fails

jobs:
  build:
    runs-on: ubuntu-latest
    # A full 50-journal Crossref walk is ~250k records; well under this, but
    # leave room for Crossref throttling + the retry backoff.
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build data (Crossref, one pull per FT50 journal)
        env:
          FT50_MAILTO: kstouras@gmail.com   # Crossref "polite pool" contact
          NODE_OPTIONS: --max-old-space-size=6144
        run: node fun/lit/_scraper-ft50/build-data.mjs

      - name: Commit refreshed data
        # If another run pushed data while this one was building, a plain
        # rebase would conflict on the one-line JSON files and a naive push
        # would silently no-op. Instead: on a rejected push, re-commit OUR
        # tree (the freshest complete build) on top of whatever landed, and
        # fail loudly if that still cannot push. (Same hardening as lit/ft50.)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fun/lit/data-ft50
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git commit -m "lit: refresh FT50 (merged catalog) data"
          for i in 1 2 3; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (concurrent commit?) — re-committing the data on the new tip…"
            git fetch origin ${{ github.ref_name }}
            # Mixed reset + re-add of ONLY the data dir: a soft reset would keep
            # this run's whole tree staged and silently revert any code commit
            # that landed on the branch while this build was running.
            git reset origin/${{ github.ref_name }}
            git add fun/lit/data-ft50
            if git diff --cached --quiet; then
              echo "The concurrent commit already contains this dataset — nothing left to push."
              exit 0
            fi
            git commit -m "lit: refresh FT50 (merged catalog) data"
            sleep 5
          done
          echo "::error::Could not push the refreshed data after 3 attempts."
          exit 1

      # A committed dataset is not enough: the GitHub Pages deploy that follows
      # the push can fail transiently, silently serving stale data. Poll the
      # live site; if the deploy didn't land, request a rebuild and poll again.
      - name: Verify the live site serves this dataset (self-heal a failed deploy)
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIVE_META: https://www.stouras.com/fun/lit/data-ft50/meta.json
        run: |
          want=$(jq -r .lastPull fun/lit/data-ft50/meta.json)
          echo "Committed dataset lastPull: $want"
          poll() {  # poll <tries> — succeed once live lastPull >= committed lastPull
            for i in $(seq 1 "$1"); do
              live=$(curl -sf --max-time 20 "$LIVE_META?nc=${GITHUB_RUN_ID}-${RANDOM}" | jq -r .lastPull || echo "unreachable")
              echo "  try $i/$1: live lastPull = $live"
              if [ "$live" != "unreachable" ] && [ ! "$live" \< "$want" ]; then return 0; fi
              sleep 60
            done
            return 1
          }
          if poll 8; then echo "Live site is serving the current dataset."; exit 0; fi
          echo "Live site still stale — requesting a GitHub Pages rebuild..."
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds" \
            || echo "WARNING: Pages rebuild request failed (check token permissions)."
          if poll 10; then echo "Live site recovered after the rebuild request."; exit 0; fi
          echo "::error::Live site is still serving stale lit FT50 data (wanted lastPull >= $want). Re-run this workflow or the pages-build-deployment workflow."
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "### lit FT50 (merged catalog) data build" >> "$GITHUB_STEP_SUMMARY"
          if [ -f fun/lit/data-ft50/meta.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat fun/lit/data-ft50/meta.json >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
