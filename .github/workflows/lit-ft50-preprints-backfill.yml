name: lit-ft50 — backfill pre-print links

# Incrementally links free pre-prints (arXiv/SSRN/bioRxiv/medRxiv/NBER/OSF)
# for lit's FT50 catalog (lit/data-ft50/) by running
# lit/_scraper-ft50/preprints-ci.mjs every couple of hours: each run does
# a bounded (~40 min) slice of title+author searches across three engines —
# OpenAlex (bonus net; it cuts an identity off after ~100 title searches/day),
# Crossref (which mints every non-arXiv pre-print host's DOIs) and arXiv's
# own API — and commits the refreshed data back. The first-deploy backlog
# (~150k papers) clears over a couple of weeks; after that each run is a
# cheap near-no-op that covers newly added papers. Twin of
# lit-preprints-backfill.yml (which covers lit's native eight sources) — see
# the header of preprints-ci.mjs.

on:
  schedule:
    # Twelve slices a day (even hours at :15 — never the 07:15 daily catalog
    # build, which is an odd hour; an overlap would only queue anyway, same
    # concurrency group). Offset from lit-preprints-backfill.yml's even-hour
    # :45 runs; this dataset also has its own OpenAlex quota identity
    # (FT50_MAILTO below), so the parallel backfills never starve each other.
    - cron: '15 */2 * * *'
  workflow_dispatch: {}      # run on demand from the Actions tab

# SAME concurrency group as lit-ft50-update-data.yml — both workflows commit
# lit/data-ft50, so they must queue behind each other, never race.
concurrency:
  group: lit-ft50-update-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write            # needed to commit the refreshed data back

jobs:
  backfill:
    runs-on: ubuntu-latest
    # Hard backstop with real headroom: 6-min by-DOI seeding + 40-min search
    # budget (whose last patient wait is deadline-capped) + apply/commit.
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backfill pre-print links (OpenAlex+Crossref+arXiv title-search, bounded)
        env:
          FT50_MAILTO: kstouras+litft50@gmail.com   # this dataset's own OpenAlex quota identity
        run: node lit/_scraper-ft50/preprints-ci.mjs

      - name: Commit refreshed data
        # always(): if the search step is killed (timeout/transient), commit
        # whatever the checkpointed cache already holds — finds are monotonic
        # and losing a whole run's links to a late kill would waste the slot.
        if: always() && github.ref == 'refs/heads/master'
        # Same hardened push as lit-ft50-update-data.yml, with one difference:
        # on a rejected push this run's tree may be STALER than what landed
        # (e.g. a daily refresh with new papers), so instead of re-committing
        # our tree we take the new tip's data and re-apply ONLY our cache finds
        # onto it (preprints-ci.mjs --apply-only --merge-cache).
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lit/data-ft50
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          cp lit/data-ft50/_preprints.json /tmp/lit-ft50-preprints-ours.json
          git commit -m "lit-ft50: backfill pre-print links"
          for i in 1 2 3; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (concurrent commit?) — re-applying our finds on the new tip…"
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            node lit/_scraper-ft50/preprints-ci.mjs --apply-only --merge-cache=/tmp/lit-ft50-preprints-ours.json
            git add lit/data-ft50
            if git diff --cached --quiet; then
              echo "The concurrent commit already contains these links — nothing left to push."
              exit 0
            fi
            git commit -m "lit-ft50: backfill pre-print links"
            sleep 5
          done
          echo "::error::Could not push the backfilled data after 3 attempts."
          exit 1
