# TEMPORARY: reconnaissance for the fun/lit data pipeline. Fetches samples of
# every external source from a runner (which has open internet, unlike the dev
# sandbox) and commits them to the branch as fixtures. Deleted once
# fun/lit/_scraper/build-data.mjs is finalized.
name: lit — probe data sources (temporary)

on:
  workflow_dispatch: {}
  push:
    branches: ['claude/multi-journal-paper-search-3rxgi7']
    paths:
      - 'fun/lit/_scraper/probe-sources.mjs'
      - '.github/workflows/lit-probe.yml'

concurrency:
  group: lit-probe-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe sources
        run: node fun/lit/_scraper/probe-sources.mjs
      - name: Commit fixtures
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A fun/lit/_scraper/_probe
          if git diff --cached --quiet; then
            echo "No fixtures."
          else
            git commit -m "lit: probe fixtures from data sources (temporary)"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          fi
