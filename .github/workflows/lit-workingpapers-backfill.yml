name: lit — backfill working-papers archive

# Grows the Working Papers archive for stouras.com/lit/ — the UNPUBLISHED
# working papers / pre-prints (SSRN, NBER, arXiv, OSF) of every listed author —
# by running lit/_scraper-workingpapers/build-data.mjs on a small, gently
# paced slice of authors every few hours, then committing lit/data-workingpapers/
# back. This is a deliberately SLOW backfill: OpenAlex is queried ~1 request /
# 1.5 s, each run does a bounded slice (WP_MAX_AUTHORS) and checkpoints after
# every author, so the archive fills in over WEEKS without tripping the API's
# rate limits. Management Science / M&SOM / POM authors (last 15 years) are
# crawled first, then the rest of the catalog. See _HOW-IT-WORKS.md.

on:
  schedule:
    # Eight slices a day (every 3 h at :20), offset from the daily builds.
    - cron: '20 */3 * * *'
  workflow_dispatch: {}      # run on demand from the Actions tab

# SAME concurrency group as the daily working-papers build — both commit
# lit/data-workingpapers, so they must queue behind each other, never race.
concurrency:
  group: lit-workingpapers-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write            # needed to commit the grown archive back

jobs:
  backfill:
    runs-on: ubuntu-latest
    # A generous slice + gentle pacing; the crawler's own wall-clock budget
    # (WP_BUDGET_MS) stops it well before this hard backstop.
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Crawl a slice of authors' working papers (OpenAlex, gently paced)
        env:
          WP_MAILTO: kstouras+litwp@gmail.com   # distinct OpenAlex quota identity
          WP_MAX_AUTHORS: '600'                  # authors per run (resumable across runs)
          WP_BUDGET_MS: '3000000'                # 50-min crawl ceiling
          WP_PACE_MS: '1500'                     # ~1 request / 1.5 s — deliberately slow
        run: node lit/_scraper-workingpapers/build-data.mjs

      - name: Commit the grown archive
        # always(): even if the crawl is killed mid-run, commit the checkpointed
        # progress (the crawl cursor + any working papers found) so the slot's
        # work is never lost. Only the default branch carries the committed data.
        if: always() && github.ref == 'refs/heads/master'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lit/data-workingpapers
          if git diff --cached --quiet; then
            echo "No archive changes — nothing to commit."
            exit 0
          fi
          git commit -m "lit: backfill working-papers archive"
          # Only these two workflows ever write lit/data-workingpapers, and
          # they share this concurrency group, so our copy of that directory is
          # authoritative. On a rejected push (a concurrent commit to master
          # touching OTHER files), replay our directory onto the new tip and retry.
          cp -r lit/data-workingpapers /tmp/wp-ours
          for i in 1 2 3; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (concurrent commit?) — replaying our archive on the new tip…"
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            rm -rf lit/data-workingpapers
            cp -r /tmp/wp-ours lit/data-workingpapers
            git add lit/data-workingpapers
            if git diff --cached --quiet; then
              echo "The tip already carries this archive state — nothing left to push."
              exit 0
            fi
            git commit -m "lit: backfill working-papers archive"
            sleep 5
          done
          echo "::error::Could not push the working-papers archive after 3 attempts."
          exit 1
