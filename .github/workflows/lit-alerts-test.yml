name: lit — e-mail alert test sends

# Delivers the one-off TEST e-mails users request from the "E-mail alerts" panel
# on stouras.com/fun/lit/ ("Send me a test e-mail"). A static GitHub Pages site
# can't send mail, so the page queues each request at users/{uid}/testEmails and
# this job flushes the queue by running the mailer in --test-emails mode. It runs
# often so a requested test arrives within a few minutes, separate from the daily
# digest run (lit-alerts-mail.yml).
#
# Like the daily mailer it is a clean no-op until the SAME secrets are set
# (FIREBASE_SERVICE_ACCOUNT + SMTP_USER/SMTP_PASS), so it never fails before
# setup. Tune or lower the schedule below (or disable this workflow) if you would
# rather deliver test e-mails less frequently. See fun/lit/_EMAIL-ALERTS-SETUP.md.

on:
  schedule:
    - cron: '*/15 * * * *'     # every 15 minutes — a "test now"-ish cadence
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — read requests and print, but send nothing'
        type: boolean
        default: false

permissions:
  contents: read              # reads the committed recent.json; never commits

concurrency:
  group: lit-alerts-test
  cancel-in-progress: false

jobs:
  test-mail:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mailer dependencies
        run: npm install --no-save firebase-admin@^12 nodemailer@^6

      - name: Send test e-mails
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERTS_FROM: ${{ secrets.ALERTS_FROM }}
          ALERTS_FROM_NAME: ${{ secrets.ALERTS_FROM_NAME }}
        run: node fun/lit/_scraper/alerts-mailer.mjs --test-emails ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
