name: lit — backfill pre-print links

# Incrementally links free pre-prints (arXiv/SSRN/bioRxiv/medRxiv/NBER/OSF)
# for stouras.com/fun/lit/ by running fun/lit/_scraper/preprints-ci.mjs every
# couple of hours: each run does a bounded (~40 min) slice of title+author
# searches across three engines — OpenAlex (bonus net; it cuts an identity
# off after ~100 title searches/day), Crossref (which mints every non-arXiv
# pre-print host's DOIs) and arXiv's own API — and commits the refreshed
# fun/lit/data/ back. The backlog clears over a few days; after that each run
# is a cheap near-no-op that covers newly added papers. See the header of
# preprints-ci.mjs.

on:
  schedule:
    # Twelve slices a day (even hours at :45), offset from the 05:00 ms and
    # 05:30 lit daily builds — a slice that overlaps the 05:30 build simply
    # queues behind it (same concurrency group).
    - cron: '45 */2 * * *'
  workflow_dispatch: {}      # run on demand from the Actions tab

# SAME concurrency group as lit-update-data.yml — both workflows commit
# fun/lit/data, so they must queue behind each other, never race.
concurrency:
  group: lit-update-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write            # needed to commit the refreshed data back

jobs:
  backfill:
    runs-on: ubuntu-latest
    # Hard backstop with real headroom: 6-min by-DOI seeding + 40-min search
    # budget (whose last patient wait is deadline-capped) + apply/commit.
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backfill pre-print links (OpenAlex+Crossref+arXiv title-search, bounded)
        env:
          LIT_MAILTO: kstouras@gmail.com   # the CI quota identity (local runs use their own)
        run: node fun/lit/_scraper/preprints-ci.mjs

      - name: Commit refreshed data
        # always(): if the search step is killed (timeout/transient), commit
        # whatever the checkpointed cache already holds — finds are monotonic
        # and losing a whole run's links to a late kill would waste the slot.
        if: always() && github.ref == 'refs/heads/master'
        # Same hardened push as lit-update-data.yml, with one difference: on a
        # rejected push this run's tree may be STALER than what landed (e.g. a
        # daily refresh with new papers), so instead of re-committing our tree
        # we take the new tip's data and re-apply ONLY our cache finds onto it
        # (preprints-ci.mjs --apply-only --merge-cache).
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fun/lit/data
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          cp fun/lit/data/_preprints.json /tmp/lit-preprints-ours.json
          git commit -m "lit: backfill pre-print links"
          for i in 1 2 3; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (concurrent commit?) — re-applying our finds on the new tip…"
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            node fun/lit/_scraper/preprints-ci.mjs --apply-only --merge-cache=/tmp/lit-preprints-ours.json
            git add fun/lit/data
            if git diff --cached --quiet; then
              echo "The concurrent commit already contains these links — nothing left to push."
              exit 0
            fi
            git commit -m "lit: backfill pre-print links"
            sleep 5
          done
          echo "::error::Could not push the backfilled data after 3 attempts."
          exit 1
