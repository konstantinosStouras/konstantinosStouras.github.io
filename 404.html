<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ideation Challenge — stouras.com / lab</title>
    <meta name="description" content="A structured space for individual and group ideation — generate, refine and vote on the best ideas together.">
    <meta name="theme-color" content="#c8562a">

    <!-- Link-preview metadata. GitHub Pages serves this root 404.html for deep
         single-page-app links such as /lab/ideasearchlab/admin/… that have no
         static file of their own, so a crawler (WhatsApp, Slack, X, LinkedIn, …)
         fetching a shared deep link lands here. These Open Graph / Twitter tags
         give it a proper picture, title and description; real browsers still run
         the redirect script below and continue into the app. -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="stouras.com / lab">
    <meta property="og:title" content="Ideation Challenge — interactive teaching app">
    <meta property="og:description" content="A structured space for individual and group ideation — generate, refine and vote on the best ideas together.">
    <meta property="og:url" content="https://www.stouras.com/lab/ideasearchlab/">
    <meta property="og:image" content="https://www.stouras.com/lab/ideasearchlab/og-image.png">
    <meta property="og:image:secure_url" content="https://www.stouras.com/lab/ideasearchlab/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Ideation Challenge — structured group ideation app">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ideation Challenge — interactive teaching app">
    <meta name="twitter:description" content="A structured space for individual and group ideation — generate, refine and vote on the best ideas together.">
    <meta name="twitter:image" content="https://www.stouras.com/lab/ideasearchlab/og-image.png">

    <script>
      var path = window.location.pathname;
      if (path.indexOf('/lab/ideasearchlab') === 0) {
        // Append a cache-buster so the SPA entry (index.html) is always fetched
        // fresh. Without it, the redirect URL is identical for a given deep link
        // (e.g. /lab/ideasearchlab/admin), so a browser/CDN can serve a cached
        // index.html from an earlier deploy that points at a since-removed
        // hashed bundle -> blank page. The app reads only the "redirect" param.
        window.location.replace(
          '/lab/ideasearchlab/?redirect=' + encodeURIComponent(path + window.location.search + window.location.hash) + '&_=' + Date.now()
        );
      }
    </script>
  </head>
  <body>
    <noscript>
      <h1>Ideation Challenge</h1>
      <p>A structured space for individual and group ideation —
        <a href="https://www.stouras.com/lab/ideasearchlab/">open the app</a>.</p>
    </noscript>
  </body>
</html>
