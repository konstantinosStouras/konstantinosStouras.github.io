<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var path = window.location.pathname;
      // Only redirect if we are inside the ideasearchlab app
      if (path.indexOf('/lab/ideasearchlab') === 0) {
        sessionStorage.setItem('spa_redirect', path + window.location.search + window.location.hash);
        window.location.replace('/lab/ideasearchlab/');
      }
    </script>
  </head>
  <body></body>
</html>
