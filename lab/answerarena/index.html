<style>
  :root{
    --blue:#0d3b8f; --blue-2:#1456c8; --ink:#16233a; --muted:#5c6b85;
    --bg:#eef3f9; --panel:#fff; --line:#dde6f1; --accent:#ffb300;
    --sel:#1456c8; --selbg:#eef4ff; --shadow:0 10px 30px rgba(20,40,80,.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:var(--bg); color:var(--ink); min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  a{color:var(--blue-2);text-decoration:none;} a:hover{text-decoration:underline;}

  /* top bar */
  #arena-top{display:none;position:sticky;top:0;z-index:50;justify-content:space-between;align-items:center;gap:10px;
    padding:9px 16px;background:linear-gradient(135deg,var(--blue) 0%,#0a2e72 100%);color:#fff;font-size:14px;}
  #arena-top .a-brand b{color:var(--accent);}

  /* layout */
  .a-wrap{max-width:600px;margin:0 auto;padding:30px 18px 70px;}
  .a-wrap.a-wide{max-width:900px;}
  .a-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:24px 26px;}
  .a-card + .a-card{margin-top:16px;}
  .a-card h2{margin:0 0 10px;font-size:1.5rem;color:var(--blue);letter-spacing:.2px;}
  .a-card p{line-height:1.6;margin:0 0 12px;color:var(--ink);}
  .a-lead{font-size:1.05rem;color:var(--muted);}
  .a-meta{color:var(--muted);font-size:.9rem;}
  .a-maininfo{max-width:760px;margin:0 auto 14px;text-align:center;color:var(--muted);}
  .a-intro h2{font-size:1.3rem;}

  /* buttons */
  .a-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;}
  .a-row.a-center{justify-content:center;}
  .a-row.a-tight{margin-top:0;gap:8px;}
  .a-btn{display:inline-block;border:none;background:var(--blue);color:#fff;font-weight:700;font-size:15px;
    padding:13px 24px;border-radius:12px;cursor:pointer;transition:.15s;}
  .a-btn:hover{background:var(--blue-2);}
  .a-btn.a-ghost{background:#fff;color:var(--blue);border:1px solid var(--line);}
  .a-btn.a-ghost:hover{background:#f5f8fd;}
  .a-btn.a-sm{padding:8px 14px;font-size:13px;}
  .a-btn.a-go{background:#1a9e57;font-size:16px;padding:14px 34px;}
  .a-btn.a-go:hover{background:#178a4c;}
  .a-btn[disabled]{opacity:.45;cursor:default;}

  /* fields */
  .a-field{margin:13px 0;}
  .a-field label{display:block;font-weight:600;font-size:14px;margin-bottom:5px;}
  .a-help{font-weight:400;color:var(--muted);font-size:12.5px;margin:-2px 0 6px;}
  .a-field input,.a-field select,.a-field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);
    border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);}
  .a-field textarea{resize:vertical;}
  .a-radio{display:flex;gap:20px;flex-wrap:wrap;}
  .a-radio label{font-weight:500;display:flex;align-items:center;gap:7px;margin:0;}
  .a-err{color:#d33c2e;font-size:13.5px;min-height:18px;margin:6px 0;}

  /* comparison */
  .a-comp{margin:0 auto;max-width:880px;}
  .a-progress{margin-bottom:14px;}
  .a-progbar{height:8px;background:#dde6f1;border-radius:99px;overflow:hidden;}
  .a-progfill{height:100%;background:linear-gradient(90deg,var(--blue) 0%,var(--blue-2) 100%);transition:width .3s;}
  .a-progtext{margin-top:6px;font-size:13px;font-weight:700;color:var(--muted);text-align:center;letter-spacing:.03em;text-transform:uppercase;}

  .a-taskcard{background:#fff;border:1px solid var(--line);border-left:5px solid var(--blue);border-radius:14px;
    padding:18px 20px;box-shadow:var(--shadow);margin-bottom:18px;}
  .a-tasklabel{font-size:11.5px;font-weight:800;letter-spacing:.08em;color:var(--blue);text-transform:uppercase;}
  .a-tasktitle{font-size:1.15rem;font-weight:700;margin:6px 0 8px;}
  .a-tasktext{line-height:1.6;white-space:pre-wrap;}

  .a-versus{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:stretch;}
  .a-vs{align-self:center;font-weight:800;color:var(--muted);font-size:14px;}
  .a-answer{background:#fff;border:2px solid var(--line);border-radius:14px;padding:16px 18px;cursor:pointer;
    transition:.14s;box-shadow:0 6px 18px rgba(20,40,80,.06);position:relative;}
  .a-answer:hover{border-color:#b9cbe8;transform:translateY(-2px);}
  .a-answer.sel{border-color:var(--sel);background:var(--selbg);box-shadow:0 10px 26px rgba(20,86,200,.18);}
  .a-anshead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .a-anstag{font-size:12.5px;font-weight:800;letter-spacing:.05em;color:var(--blue);text-transform:uppercase;}
  .a-anscheck{display:none;color:#fff;background:var(--sel);width:22px;height:22px;border-radius:50%;
    font-size:14px;line-height:22px;text-align:center;}
  .a-answer.sel .a-anscheck{display:block;}
  .a-anstext{line-height:1.6;white-space:pre-wrap;font-size:14.5px;}

  .a-tierow{display:flex;justify-content:center;margin-top:16px;}
  .a-tie{border:1.5px dashed #b9cbe8;background:#fff;color:var(--muted);font-weight:700;font-size:14px;
    padding:11px 22px;border-radius:99px;cursor:pointer;transition:.14s;}
  .a-tie:hover{border-color:var(--sel);color:var(--blue);}
  .a-tie.sel{border-style:solid;border-color:var(--sel);background:var(--selbg);color:var(--blue);}

  /* post-choice follow-up: per-answer satisfaction + reason */
  .a-follow{max-width:880px;margin:18px auto 0;background:var(--selbg);border:1px solid #cfe0fb;
    border-radius:14px;padding:16px 18px;animation:a-fade .2s ease;}
  @keyframes a-fade{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
  .a-followhead{font-size:11.5px;font-weight:800;letter-spacing:.08em;color:var(--blue);
    text-transform:uppercase;margin-bottom:12px;}
  .a-rates{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:6px;}
  .a-ratewrap{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
  .a-ratelabel{font-weight:600;font-size:14px;margin-bottom:8px;}
  .a-rate{display:flex;gap:6px;}
  .a-ratebtn{flex:1 1 0;border:1px solid var(--line);background:#fff;color:var(--muted);font-weight:700;
    font-size:14px;padding:9px 0;border-radius:9px;cursor:pointer;transition:.12s;}
  .a-ratebtn:hover{border-color:#b9cbe8;}
  .a-ratebtn.on{background:var(--sel);border-color:var(--sel);color:#fff;}
  .a-ratescale{display:flex;justify-content:space-between;margin-top:6px;font-size:11.5px;color:var(--muted);}
  .a-follow .a-field{margin:14px 0 0;}

  /* condition banner */
  .a-banner{max-width:760px;margin:0 auto 10px;background:#fff7e0;border:1px solid #ffe08a;color:#7a5a00;
    border-radius:12px;padding:11px 16px;font-size:14px;}

  /* onboarding spotlight tour */
  .a-tour{position:fixed;inset:0;z-index:9000;pointer-events:none;}
  .a-spot{position:absolute;border-radius:14px;box-shadow:0 0 0 9999px rgba(10,25,55,.66);
    transition:left .25s,top .25s,width .25s,height .25s;pointer-events:none;}
  .a-tip{position:absolute;max-width:330px;width:calc(100vw - 24px);background:#fff;color:var(--ink);border-radius:14px;
    padding:16px 18px;box-shadow:0 18px 46px rgba(0,0,0,.35);pointer-events:auto;}
  .a-tip h3{font-size:16px;margin:4px 0 6px;}
  .a-tip p{font-size:14px;line-height:1.55;margin:0 0 12px;color:var(--muted);}
  .a-step{font-size:11px;color:var(--blue);font-weight:800;text-transform:uppercase;letter-spacing:.06em;}
  .a-tiprow{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .a-skip{background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;}

  @media (max-width:680px){
    .a-versus{grid-template-columns:1fr;}
    .a-vs{justify-self:center;}
    .a-card{padding:20px 18px;}
    .a-rates{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
  <div id="arena-top"></div>
  <div id="arena-screen">
    <div class="a-wrap"><div class="a-card"><p>Loading Answer Arena...</p></div></div>
  </div>

  <noscript><div class="a-wrap"><div class="a-card"><p>This study needs JavaScript enabled. Please turn it on and reload.</p></div></div></noscript>

  <!-- Load order matters: config -> defaults -> store -> app/admin -->
  <script src="arena-config.js"></script>
  <script src="arena-data.js"></script>
  <script src="arena-store.js"></script>
  <script src="arena-app.js" defer></script>
  <script src="admin.js" defer></script>
</body>
