<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin — Ideation Challenge</title>
    <meta name="description" content="A structured space for individual and group ideation — generate, refine and vote on the best ideas together.">
    <meta name="theme-color" content="#c8562a">
    <link rel="canonical" href="https://www.stouras.com/lab/ideasearchlab/admin">

    <!-- Link-preview metadata. This file exists so the deep link returns HTTP 200
         (GitHub Pages serves its custom 404.html with a 404 status, which crawlers
         such as WhatsApp / Slack / X ignore). A real browser runs the redirect
         below and continues into the single-page app at this route. -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="stouras.com / lab">
    <meta property="og:title" content="Admin — Ideation Challenge">
    <meta property="og:description" content="A structured space for individual and group ideation — generate, refine and vote on the best ideas together.">
    <meta property="og:url" content="https://www.stouras.com/lab/ideasearchlab/admin">
    <meta property="og:image" content="https://www.stouras.com/lab/ideasearchlab/og-image.png">
    <meta property="og:image:secure_url" content="https://www.stouras.com/lab/ideasearchlab/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Ideation Challenge — structured group ideation app">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Admin — Ideation Challenge">
    <meta name="twitter:description" content="A structured space for individual and group ideation — generate, refine and vote on the best ideas together.">
    <meta name="twitter:image" content="https://www.stouras.com/lab/ideasearchlab/og-image.png">

    <script>
      // Drop any trailing slash so the SPA route matches, then hand off to the app
      // entry with the deep path in ?redirect= (same mechanism as the root 404.html).
      var path = window.location.pathname.replace(/\/+$/, '');
      window.location.replace(
        '/lab/ideasearchlab/?redirect=' + encodeURIComponent(path + window.location.search + window.location.hash) + '&_=' + Date.now()
      );
    </script>
  </head>
  <body>
    <noscript>
      <h1>Admin — Ideation Challenge</h1>
      <p>A structured space for individual and group ideation — generate, refine and vote on the best ideas together. <a href="https://www.stouras.com/lab/ideasearchlab/">Open the app</a>.</p>
    </noscript>
  </body>
</html>
