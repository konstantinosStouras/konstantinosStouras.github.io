<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf7ef"/>
      <stop offset="1" stop-color="#f1e6d3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8632f"/>
      <stop offset="1" stop-color="#c0481f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent panel -->
  <rect x="0" y="0" width="440" height="630" fill="url(#accent)"/>
  <circle cx="120" cy="120" r="220" fill="#ffffff" opacity="0.06"/>
  <circle cx="400" cy="520" r="180" fill="#ffffff" opacity="0.05"/>

  <!-- Eyebrow -->
  <g transform="translate(48,54)">
    <rect x="0" y="0" width="196" height="34" rx="17" fill="#ffffff" opacity="0.16"/>
    <text x="18" y="23" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ffffff" letter-spacing="1">stouras.com / lab</text>
  </g>
  <text x="48" y="120" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#ffe6d3" letter-spacing="2">INTERACTIVE TEACHING APP</text>

  <!-- Idea lamp -->
  <g transform="translate(220,335)">
    <g stroke="#fff5e6" stroke-width="9" stroke-linecap="round" opacity="0.92">
      <path d="M0,-150 v34"/>
      <path d="M-106,-106 l24,24"/>
      <path d="M106,-106 l-24,24"/>
      <path d="M-150,0 h34"/>
      <path d="M150,0 h-34"/>
    </g>
    <circle cx="0" cy="0" r="92" fill="#ffd98a"/>
    <circle cx="0" cy="0" r="92" fill="none" stroke="#fff4d6" stroke-width="4" opacity="0.6"/>
    <path fill="#ffd98a" d="M-34,74 h68 v34 h-68z"/>
    <rect x="-38" y="104" width="76" height="22" rx="11" fill="#7c3417"/>
    <rect x="-26" y="132" width="52" height="20" rx="10" fill="#7c3417"/>
  </g>

  <!-- Headline + tagline -->
  <g transform="translate(496,0)">
    <text x="0" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="86" fill="#2b2622">Ideation</text>
    <text x="0" y="338" font-family="Georgia, 'Times New Roman', serif" font-size="86" fill="#2b2622">Challenge</text>
    <text x="2" y="406" font-family="DejaVu Sans, Arial, sans-serif" font-size="27" fill="#6c6358">A structured space for individual and group</text>
    <text x="2" y="444" font-family="DejaVu Sans, Arial, sans-serif" font-size="27" fill="#6c6358">ideation — generate, refine and vote on the</text>
    <text x="2" y="482" font-family="DejaVu Sans, Arial, sans-serif" font-size="27" fill="#6c6358">best ideas together.</text>
    <text x="2" y="558" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="bold" fill="#c0481f">stouras.com/lab/ideasearchlab</text>
  </g>
</svg>
