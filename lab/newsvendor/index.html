<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Newsvendor Game &mdash; Redirecting&hellip;</title>
  <meta name="description" content="The Newsvendor Game: an interactive classroom simulation of the classic newsvendor inventory problem." />
  <!-- Canonical points to the live app so search engines index the real destination -->
  <link rel="canonical" href="https://newsvendor-kostas.web.app/" />
  <!-- Primary redirect: send visitors straight to the live app on Firebase Hosting -->
  <meta http-equiv="refresh" content="0; url=https://newsvendor-kostas.web.app/" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #faf8f5;
      color: #2b2b2b;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .emoji { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 22px; margin: 0 0 8px; font-weight: 700; }
    p { font-size: 15px; color: #5b5b5b; margin: 0 0 20px; max-width: 28rem; line-height: 1.5; }
    a.btn {
      display: inline-block;
      background: #e8a33d;
      color: #1f1300;
      text-decoration: none;
      font-weight: 600;
      padding: 11px 22px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    a.btn:hover { background: #d8922d; }
    .small { font-size: 13px; color: #8a8a8a; margin-top: 18px; }
    .small a { color: #8a8a8a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="emoji">🥐</div>
    <h1>The Newsvendor Game</h1>
    <p>Taking you to the live app&hellip; If you are not redirected automatically, use the button below.</p>
    <a class="btn" href="https://newsvendor-kostas.web.app/">Open the Newsvendor Game &rarr;</a>
    <p class="small">Live app hosted at <a href="https://newsvendor-kostas.web.app/">newsvendor-kostas.web.app</a></p>
  </div>
  <!-- JS fallback in case meta-refresh is blocked -->
  <script>window.location.replace("https://newsvendor-kostas.web.app/");</script>
</body>
</html>
